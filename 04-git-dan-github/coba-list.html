<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba List</title>
  </head>
  <body>
    <h2>Ordered List / Daftar Terurut</h2>
    <ol type="A">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
      <li>Item 5</li>
    </ol>
    <br />
    <h2>Unordered List / Daftar Tidak Terurut</h2>
    <ul type="square">
      <li>Item 01</li>
      <li>Item 02</li>
      <li>Item 03</li>
      <li>Item 04</li>
      <li>Item 05</li>
    </ul>
<br>
<dl>
  <!-- Tipe pertama pake rumus: dl>dt{...}>dd{...} -->
  <dt>HTML
    <dd>Hypertext Markup Language</dd>
  </dt>
  <!-- Tipe kedua input manual -->
  <dt>CSS</dt>
  <dd>Cascading Style Sheet</dd>
</dl>
  </body>
</html>
